<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>gscp  管理面板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         oklch(13% 0.012 255);
  --surface:    oklch(17% 0.014 255);
  --surface2:   oklch(21% 0.016 255);
  --border:     oklch(27% 0.018 255);
  --accent:     oklch(68% 0.19 145);
  --accent-dim: oklch(68% 0.19 145 / 0.13);
  --accent-hi:  oklch(68% 0.19 145 / 0.25);
  --danger:     oklch(62% 0.22 25);
  --danger-dim: oklch(62% 0.22 25 / 0.12);
  --warn:       oklch(75% 0.17 75);
  --text:       oklch(91% 0.01 255);
  --text-2:     oklch(62% 0.018 255);
  --text-3:     oklch(42% 0.016 255);
  --sidebar-w:  220px;
  --mono: "DM Mono", monospace;
  --sans: "DM Sans", sans-serif;
  --display: "Syne", sans-serif;
}
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  line-height: 1.5;
}

/*  App shell  */
.app { display: flex; flex: 1; min-height: 0; }

/*  Sidebar  */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 1.5rem 0 1rem;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 0 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
}
.wordmark {
  font-family: var(--display);
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  line-height: 1;
}
.wordmark .dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent);
  flex-shrink: 0;
  margin-bottom: 1px;
}
.sidebar-tagline {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--text-3);
  margin-top: 0.3rem;
  letter-spacing: 0.04em;
}
.nav-section {
  padding: 0 0.75rem;
  margin-bottom: 0.25rem;
}
.nav-section-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 0 0.5rem;
  margin-bottom: 0.35rem;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.875rem;
  color: var(--text-2);
  transition: background 0.12s, color 0.12s;
  user-select: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--sans);
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 500;
}
.nav-item.active .nav-icon { opacity: 1; }
.nav-icon { opacity: 0.5; flex-shrink: 0; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.68rem;
  background: var(--surface2);
  color: var(--text-3);
  border-radius: 4px;
  padding: 0.1rem 0.4rem;
  min-width: 1.4rem;
  text-align: center;
}
.nav-item.active .nav-badge {
  background: var(--accent-hi);
  color: var(--accent);
}

/*  Main content  */
.main {
  flex: 1;
  min-width: 0;
  overflow-y: auto;
  padding: clamp(1.5rem, 3vw, 2.5rem) clamp(1.25rem, 3vw, 2.5rem);
}
.page { display: none; animation: fadeUp 0.2s ease-out both; }
.page.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/*  Page header  */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.page-title {
  font-family: var(--display);
  font-size: clamp(1.4rem, 3vw, 1.9rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.page-sub {
  font-size: 0.82rem;
  color: var(--text-3);
  margin-top: 0.3rem;
  font-family: var(--mono);
}
.page-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

/*  Section label  */
.section-label {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/*  Cards / panels  */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.panel-body { padding: 1.25rem 1.5rem; }

/*  Form  */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}
@media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 0.3rem; }
.field label {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-3);
  letter-spacing: 0.06em;
}
.field input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.55rem 0.85rem;
  font-size: 0.875rem;
  font-family: var(--sans);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
}
.field input::placeholder { color: var(--text-3); }
.field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.field input:disabled { opacity: 0.45; cursor: not-allowed; }
.form-footer {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.err-msg { font-size: 0.8rem; color: var(--danger); font-family: var(--mono); }

/*  Buttons  */
.btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.52rem 1.1rem;
  border-radius: 8px; border: none; cursor: pointer;
  font-size: 0.85rem; font-weight: 500; font-family: var(--sans);
  transition: transform 0.1s, opacity 0.15s, box-shadow 0.15s;
  white-space: nowrap; text-decoration: none;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: oklch(13% 0.012 255); font-weight: 600; }
.btn-primary:hover { box-shadow: 0 0 18px var(--accent-dim); opacity: 0.9; }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--text-3); color: var(--text); }
.btn-warn { background: var(--warn); color: oklch(13% 0.012 255); font-weight: 600; }
.btn-warn:hover { opacity: 0.88; }
.btn-sm { padding: 0.3rem 0.65rem; font-size: 0.8rem; }
.btn-danger-ghost { background: transparent; color: var(--danger); border: 1px solid transparent; }
.btn-danger-ghost:hover { background: var(--danger-dim); border-color: var(--danger); }
.btn-edit { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
.btn-edit:hover { border-color: var(--accent); color: var(--accent); }

/*  Server list  */
.list-header {
  display: grid;
  grid-template-columns: minmax(90px,150px) 1fr minmax(80px,110px) auto;
  gap: 1rem;
  padding: 0.55rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.list-header span {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
}
.server-item {
  display: grid;
  grid-template-columns: minmax(90px,150px) 1fr minmax(80px,110px) auto;
  align-items: center;
  gap: 1rem;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  animation: slideIn 0.22s ease-out both;
}
.server-item:last-child { border-bottom: none; }
.server-item:hover { background: var(--surface2); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.alias-badge {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid var(--accent-hi);
  border-radius: 5px;
  padding: 0.18rem 0.55rem;
  display: inline-block;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.host-text { font-family: var(--mono); font-size: 0.82rem; color: var(--text-2); }
.user-text { font-size: 0.82rem; color: var(--text-2); }
.item-actions { display: flex; gap: 0.35rem; justify-content: flex-end; }

/*  Inline edit panel  */
.edit-panel {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.26s cubic-bezier(0.4,0,0.2,1);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.edit-panel.open { grid-template-rows: 1fr; }
.edit-panel-inner { overflow: hidden; }
.edit-panel-content {
  padding: 1.25rem 1.5rem;
  border-top: 1px solid var(--border);
}

/*  Import JSON panel  */
.import-row {
  display: flex;
  gap: 0.6rem;
  align-items: flex-end;
}
.import-row .field { flex: 1; }
.import-status {
  font-family: var(--mono);
  font-size: 0.78rem;
  margin-top: 0.6rem;
  min-height: 1.2em;
}
.import-status.ok { color: var(--accent); }
.import-status.err { color: var(--danger); }
.import-status.loading { color: var(--text-3); }

/*  Empty state  */
.empty-state { padding: 3rem 1rem; text-align: center; }
.empty-icon { font-size: 1.8rem; opacity: 0.25; margin-bottom: 0.6rem; }
.empty-state p { color: var(--text-3); font-size: 0.85rem; font-family: var(--mono); }

/*  Coming soon  */
.coming-soon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 40vh;
  gap: 1rem;
  color: var(--text-3);
}
.coming-soon .cs-icon { font-size: 3rem; opacity: 0.2; }
.coming-soon h2 { font-family: var(--display); font-size: 1.3rem; font-weight: 700; color: var(--text-2); }
.coming-soon p { font-family: var(--mono); font-size: 0.8rem; }

/*  Toast  */
#toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; align-items: center; gap: 0.5rem;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 0.6rem 1rem;
  border-radius: 10px; font-size: 0.83rem; font-family: var(--mono);
  opacity: 0; pointer-events: none; transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999; box-shadow: 0 8px 28px oklch(0% 0 0 / 0.45);
}
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
#toast.error .toast-dot { background: var(--danger); }
#toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

/* ── Projects page ─────────────────────────────────────── */
.proj-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 1.25rem;
  align-items: start;
  min-height: calc(100vh - 12rem);
}
@media (max-width: 860px) {
  .proj-layout { grid-template-columns: 1fr; }
}

/* Workspace list column */
.ws-list-col {}
.ws-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.7rem 1rem;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
  border: 1px solid transparent;
  margin-bottom: 0.3rem;
  animation: slideIn 0.2s ease-out both;
}
.ws-item:hover { background: var(--surface); border-color: var(--border); }
.ws-item.active {
  background: var(--accent-dim);
  border-color: var(--accent-hi);
}
.ws-item.active .ws-name { color: var(--accent); }
.ws-item.active .ws-icon { color: var(--accent); opacity: 1; }
.ws-icon { color: var(--text-3); flex-shrink: 0; opacity: 0.6; }
.ws-text { flex: 1; min-width: 0; }
.ws-name {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ws-sub {
  font-size: 0.72rem;
  color: var(--text-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 0.1rem;
}
.ws-remove {
  opacity: 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-3);
  padding: 0.2rem;
  border-radius: 4px;
  flex-shrink: 0;
  transition: opacity 0.12s, color 0.12s, background 0.12s;
  display: flex;
  align-items: center;
}
.ws-item:hover .ws-remove { opacity: 1; }
.ws-remove:hover { color: var(--danger); background: var(--danger-dim); }

/* genv editor column */
.genv-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  min-height: 420px;
  display: flex;
  flex-direction: column;
}
.genv-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  color: var(--text-3);
  padding: 3rem 1rem;
  text-align: center;
}
.genv-placeholder p { font-family: var(--mono); font-size: 0.82rem; line-height: 1.7; }
.genv-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.genv-editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 1rem;
  flex-wrap: wrap;
}
.genv-path {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 340px;
}
.genv-file-hint {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--accent);
  margin-top: 0.1rem;
}

/* Visual editor body */
.genv-visual-body {
  flex: 1;
  padding: 1.25rem 1.5rem;
  overflow-y: auto;
}

/* Groups section */
.groups-editor {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}
.group-row {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  animation: slideIn 0.18s ease-out both;
}
.group-row:last-child { border-bottom: none; }
.group-name-col {
  font-family: var(--mono);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--warn);
  min-width: 90px;
  padding-top: 0.3rem;
  word-break: break-all;
}
.group-members-col {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  align-items: center;
}
.member-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 0.15rem 0.45rem;
  color: var(--text-2);
}
.member-chip-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-3);
  padding: 0;
  line-height: 1;
  display: flex;
  align-items: center;
  border-radius: 3px;
  transition: color 0.12s;
}
.member-chip-remove:hover { color: var(--danger); }
.add-member-row {
  display: flex;
  gap: 0.35rem;
  align-items: center;
  margin-top: 0.1rem;
}
.add-member-row input,
.add-member-row select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 0.28rem 0.55rem;
  font-size: 0.75rem;
  font-family: var(--mono);
  outline: none;
  width: 140px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.add-member-row input:focus,
.add-member-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.add-member-row input::placeholder { color: var(--text-3); }
.add-member-row select option { background: var(--surface2); }
.group-row-actions { display: flex; align-items: flex-start; padding-top: 0.2rem; }
.add-group-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  padding: 0.65rem 1rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.add-group-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 0.35rem 0.65rem;
  font-size: 0.78rem;
  font-family: var(--mono);
  outline: none;
  width: 130px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.add-group-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.add-group-row input::placeholder { color: var(--text-3); }

/* Target cards */
.targets-list { display: flex; flex-direction: column; gap: 0.75rem; }
.target-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.target-card:hover { border-color: oklch(35% 0.018 255); }
.target-card.is-default { border-color: var(--accent-hi); }
.target-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  cursor: pointer;
  user-select: none;
}
.target-key {
  font-family: var(--mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
  flex: 1;
}
.target-alias-tag {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--text-3);
}
.default-badge {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--accent-hi);
  border-radius: 4px;
  padding: 0.1rem 0.4rem;
}
.target-chevron {
  color: var(--text-3);
  transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}
.target-card.open .target-chevron { transform: rotate(90deg); }

/* Target expand panel */
.target-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.26s cubic-bezier(0.4,0,0.2,1);
}
.target-card.open .target-body { grid-template-rows: 1fr; }
.target-body-inner { overflow: hidden; }
.target-body-content {
  padding: 0 1rem 1rem;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
}
.target-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.65rem;
  margin-bottom: 0.75rem;
}
@media (max-width: 600px) { .target-form-grid { grid-template-columns: 1fr; } }
.field textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.55rem 0.85rem;
  font-size: 0.82rem;
  font-family: var(--mono);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}
.field textarea::placeholder { color: var(--text-3); }
.field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.field select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.55rem 0.85rem;
  font-size: 0.875rem;
  font-family: var(--sans);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
  cursor: pointer;
}
.field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.field select option { background: var(--surface2); }
.target-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.75rem;
}

/* Add target row */
.add-target-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-top: 0.75rem;
}
.add-target-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.45rem 0.75rem;
  font-size: 0.82rem;
  font-family: var(--mono);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 160px;
}
.add-target-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.add-target-row input::placeholder { color: var(--text-3); }

#genv-raw { flex-direction: column; }

/* Raw textarea */
.raw-textarea {
  flex: 1;
  width: 100%;
  background: var(--bg);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--text);
  padding: 1.25rem 1.5rem;
  font-size: 0.82rem;
  font-family: var(--mono);
  outline: none;
  resize: none;
  line-height: 1.7;
  min-height: 360px;
}
.raw-hint {
  padding: 0.5rem 1.5rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  min-height: 1.8rem;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.raw-hint.ok { color: var(--accent); }
.raw-hint.err { color: var(--danger); }

/*  Mobile sidebar  */
.sidebar-toggle {
  display: none;
  position: fixed; top: 1rem; left: 1rem;
  z-index: 200;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.4rem 0.6rem;
  cursor: pointer; color: var(--text-2);
}
@media (max-width: 700px) {
  .sidebar-toggle { display: flex; align-items: center; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 150;
    transform: translateX(-100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 4px 0 24px oklch(0% 0 0 / 0.4);
  }
  .sidebar.open { transform: translateX(0); }
  .main { padding-top: 4rem; }
  .server-item, .list-header {
    grid-template-columns: minmax(80px,120px) 1fr auto;
  }
  .server-item .user-text, .list-header .col-user { display: none; }
}
</style>
</head>

<div id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>
<script>
let servers = [];
let openEditAlias = null;

//  Navigation 
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (window.innerWidth <= 700) closeSidebar();
  if (name === 'projects') loadWorkspaces();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}
document.addEventListener('click', function(e) {
  const sb = document.getElementById('sidebar');
  const toggle = document.querySelector('.sidebar-toggle');
  if (window.innerWidth <= 700 && sb.classList.contains('open')) {
    if (!sb.contains(e.target) && !toggle.contains(e.target)) closeSidebar();
  }
});

//  Load servers 
async function loadServers() {
  try {
    const res = await fetch('/api/servers');
    servers = await res.json() || [];
    renderList();
  } catch(e) {
    showToast('加载失败: ' + e.message, true);
  }
}

function renderList() {
  const container = document.getElementById('server-list');
  const count = servers ? servers.length : 0;
  document.getElementById('nav-count').textContent = count;

  if (!count) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"></div><p>暂无服务器  在上方添加第一台</p></div>';
    return;
  }

  container.innerHTML = servers.map((s, i) => `
    <div style="animation-delay:${i*35}ms">
      <div class="server-item">
        <div><span class="alias-badge">${esc(s.alias)}</span></div>
        <div class="host-text">${esc(s.host)}</div>
        <div class="user-text">${esc(s.username)}</div>
        <div class="item-actions">
          <button class="btn btn-edit btn-sm" onclick="toggleEdit('${esc(s.alias)}')">编辑</button>
          <button class="btn btn-danger-ghost btn-sm" onclick="deleteServer('${esc(s.alias)}')">删除</button>
        </div>
      </div>
      <div class="edit-panel" id="panel-${esc(s.alias)}">
        <div class="edit-panel-inner">
          <div class="edit-panel-content">
            <div class="form-grid">
              <div class="field">
                <label>HOST[:PORT]</label>
                <input id="e-host-${esc(s.alias)}" value="${esc(s.host)}" />
              </div>
              <div class="field">
                <label>USERNAME</label>
                <input id="e-user-${esc(s.alias)}" value="${esc(s.username)}" />
              </div>
              <div class="field" style="grid-column:1/-1">
                <label>PASSWORD（留空则不修改）</label>
                <input id="e-pass-${esc(s.alias)}" type="password" placeholder="" />
              </div>
            </div>
            <div class="form-footer">
              <button class="btn btn-primary" onclick="saveEdit('${esc(s.alias)}')">保存</button>
              <button class="btn btn-ghost" onclick="toggleEdit('${esc(s.alias)}')">取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

//  Edit 
function toggleEdit(alias) {
  if (openEditAlias && openEditAlias !== alias) {
    const prev = document.getElementById('panel-' + openEditAlias);
    if (prev) prev.classList.remove('open');
  }
  const panel = document.getElementById('panel-' + alias);
  if (!panel) return;
  const isOpen = panel.classList.toggle('open');
  openEditAlias = isOpen ? alias : null;
  if (isOpen) setTimeout(() => { const el = document.getElementById('e-host-' + alias); if (el) el.focus(); }, 50);
}

//  Add 
async function addServer() {
  const alias = document.getElementById('f-alias').value.trim();
  const host  = document.getElementById('f-host').value.trim();
  const user  = document.getElementById('f-user').value.trim();
  const pass  = document.getElementById('f-pass').value;
  const errEl = document.getElementById('add-err');
  if (!alias || !host || !user || !pass) { errEl.textContent = '所有字段均为必填'; return; }
  errEl.textContent = '';
  try {
    const res = await fetch('/api/servers', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({alias, host, username: user, password: pass})
    });
    if (!res.ok) { const d = await res.json(); errEl.textContent = d.error || '添加失败'; return; }
    ['f-alias','f-host','f-user','f-pass'].forEach(id => document.getElementById(id).value = '');
    showToast('服务器已添加');
    loadServers();
  } catch(e) { errEl.textContent = e.message; }
}

//  Save edit 
async function saveEdit(alias) {
  const s = servers.find(x => x.alias === alias);
  const host = document.getElementById('e-host-' + alias).value.trim();
  const user = document.getElementById('e-user-' + alias).value.trim();
  const pass = document.getElementById('e-pass-' + alias).value || (s && s.password) || '';
  if (!host || !user) { showToast('主机和用户名不能为空', true); return; }
  try {
    const res = await fetch('/api/servers/' + encodeURIComponent(alias), {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({host, username: user, password: pass})
    });
    if (!res.ok) { const d = await res.json(); showToast(d.error || '保存失败', true); return; }
    const panel = document.getElementById('panel-' + alias);
    if (panel) panel.classList.remove('open');
    openEditAlias = null;
    showToast('已保存');
    loadServers();
  } catch(e) { showToast(e.message, true); }
}

//  Delete 
async function deleteServer(alias) {
  if (!confirm('确认删除服务器 "' + alias + '"？')) return;
  try {
    const res = await fetch('/api/servers/' + encodeURIComponent(alias), {method: 'DELETE'});
    if (!res.ok && res.status !== 204) { const d = await res.json(); showToast(d.error || '删除失败', true); return; }
    showToast('已删除');
    loadServers();
  } catch(e) { showToast(e.message, true); }
}

//  Import from URL 
async function importFromURL() {
  const url = document.getElementById('import-url').value.trim();
  const statusEl = document.getElementById('import-status');
  const btn = document.getElementById('import-btn');
  if (!url) { statusEl.className = 'import-status err'; statusEl.textContent = '请输入 URL'; return; }
  statusEl.className = 'import-status loading'; statusEl.textContent = '正在获取';
  btn.disabled = true;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('JSON 必须是数组格式');
    let added = 0, skipped = 0, errors = [];
    for (const item of data) {
      if (!item.alias || !item.host || !item.username || !item.password) {
        errors.push(item.alias || '?'); continue;
      }
      const r = await fetch('/api/servers', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({alias: item.alias, host: item.host, username: item.username, password: item.password})
      });
      if (r.ok || r.status === 201) { added++; }
      else { const d = await r.json(); if (d.error && d.error.includes('exist')) skipped++; else errors.push(item.alias); }
    }
    let msg = `导入完成：新增 ${added} 台`;
    if (skipped) msg += `，跳过 ${skipped} 台（已存在）`;
    if (errors.length) msg += `，失败 ${errors.length} 台`;
    statusEl.className = 'import-status ok'; statusEl.textContent = msg;
    showToast(msg);
    loadServers();
  } catch(e) {
    statusEl.className = 'import-status err'; statusEl.textContent = '导入失败：' + e.message;
    showToast('导入失败：' + e.message, true);
  } finally { btn.disabled = false; }
}

//  Utils 
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastTimer;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// Enter on add form
['f-alias','f-host','f-user','f-pass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') addServer(); });
});
document.getElementById('import-url').addEventListener('keydown', e => { if (e.key === 'Enter') importFromURL(); });

loadServers();
loadWorkspaces();

// ═══════════════════════════════════════════════════════
//  Projects page
// ═══════════════════════════════════════════════════════
let workspaces = [];
let activeWsPath = null;
let genvData = null;   // { path, groups, targets, raw }
let rawMode = false;
let openTargetKey = null;

// ── Load workspaces ──────────────────────────────────
async function loadWorkspaces() {
  try {
    const res = await fetch('/api/workspaces');
    workspaces = await res.json() || [];
    renderWorkspaces();
    // Update nav badge
    document.getElementById('nav-ws-count').textContent = workspaces.length;
  } catch(e) {
    showToast('加载工作区失败: ' + e.message, true);
  }
}

function renderWorkspaces() {
  const el = document.getElementById('ws-list');
  if (!workspaces.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📂</div>
      <p>暂无工作区记录<br>运行 <code style="color:var(--accent)">gscp init</code> 或 <code style="color:var(--accent)">gscp run</code> 后自动记录</p>
    </div>`;
    return;
  }
  el.innerHTML = workspaces.map((p, i) => {
    const parts = p.replace(/\\/g, '/').split('/');
    const name = parts[parts.length - 1] || p;
    const parent = parts.slice(0, -1).join('/') || '/';
    const isActive = p === activeWsPath;
    return `<div class="ws-item${isActive ? ' active' : ''}" data-ws-idx="${i}" style="animation-delay:${i*30}ms">
      <svg class="ws-icon" width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 3A1.5 1.5 0 013 1.5h3.379a1.5 1.5 0 011.06.44l.622.621A1.5 1.5 0 009.12 3H12A1.5 1.5 0 0113.5 4.5v7A1.5 1.5 0 0112 13H3a1.5 1.5 0 01-1.5-1.5V3z" stroke="currentColor" stroke-width="1.3"/></svg>
      <div class="ws-text">
        <div class="ws-name">${esc(name)}</div>
        <div class="ws-sub">${esc(parent)}</div>
      </div>
      <button class="ws-remove" data-ws-remove-idx="${i}" title="从列表移除">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2l9 9M11 2l-9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>`;
  }).join('');

  // Attach click handlers via JS (avoids HTML attribute escaping issues with paths)
  el.querySelectorAll('.ws-item').forEach(item => {
    const idx = parseInt(item.dataset.wsIdx, 10);
    item.addEventListener('click', () => selectWorkspace(workspaces[idx]));
  });
  el.querySelectorAll('.ws-remove').forEach(btn => {
    const idx = parseInt(btn.dataset.wsRemoveIdx, 10);
    btn.addEventListener('click', e => { e.stopPropagation(); removeWorkspace(workspaces[idx]); });
  });
}

async function selectWorkspace(path) {
  activeWsPath = path;
  renderWorkspaces();
  openTargetKey = null;
  rawMode = false;

  const editor = document.getElementById('genv-editor');
  const placeholder = document.getElementById('genv-placeholder');
  editor.style.display = 'none';
  placeholder.style.display = 'flex';

  try {
    const res = await fetch('/api/genv/read', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path})
    });
    if (res.status === 404) {
      placeholder.style.display = 'flex';
      placeholder.innerHTML = `<svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.18"><path d="M8 8.5A2.5 2.5 0 0110.5 6h10.086a2.5 2.5 0 011.768.732l7.914 7.914A2.5 2.5 0 0131 16.414V33.5A2.5 2.5 0 0128.5 36h-18A2.5 2.5 0 018 33.5v-25z" stroke="currentColor" stroke-width="2"/><path d="M21 6v9a1 1 0 001 1h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <p>该目录下没有 .genv 文件<br><span style="color:var(--text-3)">运行 <code style="color:var(--accent)">gscp init</code> 创建</span></p>`;
      return;
    }
    if (!res.ok) { const d = await res.json(); showToast(d.error || '读取失败', true); return; }
    genvData = await res.json();
    // Normalize nulls that Go may serialize for empty maps
    if (!genvData.groups)  genvData.groups  = {};
    if (!genvData.targets) genvData.targets = {};
    renderGenvEditor();
  } catch(e) {
    showToast('读取 .genv 失败: ' + e.message, true);
  }
}

async function removeWorkspace(path) {
  if (!confirm(`从列表中移除工作区？\n${path}\n\n（不会删除文件）`)) return;
  try {
    const res = await fetch('/api/workspaces', {
      method: 'DELETE',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path})
    });
    if (res.ok || res.status === 204) {
      if (activeWsPath === path) {
        activeWsPath = null;
        genvData = null;
        document.getElementById('genv-editor').style.display = 'none';
        document.getElementById('genv-placeholder').style.display = 'flex';
        document.getElementById('genv-placeholder').innerHTML = `<svg width="40" height="40" viewBox="0 0 40 40" fill="none" opacity="0.18"><path d="M8 8.5A2.5 2.5 0 0110.5 6h10.086a2.5 2.5 0 011.768.732l7.914 7.914A2.5 2.5 0 0131 16.414V33.5A2.5 2.5 0 0128.5 36h-18A2.5 2.5 0 018 33.5v-25z" stroke="currentColor" stroke-width="2"/><path d="M21 6v9a1 1 0 001 1h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><p>选择左侧工作区<br>查看并编辑 .genv</p>`;
      }
      showToast('已移除');
      loadWorkspaces();
    }
  } catch(e) { showToast(e.message, true); }
}

// ── Render genv editor ───────────────────────────────
function renderGenvEditor() {
  if (!genvData) return;
  const placeholder = document.getElementById('genv-placeholder');
  const editor = document.getElementById('genv-editor');
  placeholder.style.display = 'none';
  editor.style.display = 'flex';

  document.getElementById('genv-path-label').textContent = genvData.path;

  // Sync raw textarea
  document.getElementById('genv-raw-textarea').value = genvData.raw;
  document.getElementById('raw-hint').textContent = '';
  document.getElementById('raw-hint').className = 'raw-hint';

  // Show correct mode
  applyRawMode();
  renderVisual();
}

function renderVisual() {
  if (!genvData) return;
  const container = document.getElementById('genv-visual');
  const { groups, targets } = genvData;
  const servers = window._servers || [];

  // Groups section — editable
  const groupEntries = Object.entries(groups || {});
  const groupRows = groupEntries.map(([name, members], gi) => {
    const memberChips = members.map((m, mi) =>
      `<span class="member-chip">${esc(m)}<button class="member-chip-remove" onclick="removeMember(${gi},'${esc(name)}',${mi})" title="移除">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button></span>`
    ).join('');
    return `<div class="group-row">
      <div class="group-name-col">${esc(name)}</div>
      <div class="group-members-col">
        ${memberChips}
        <div class="add-member-row">
          <select id="new-member-${gi}">
            <option value="">— 选择环境 —</option>
            ${Object.keys(targets||{}).filter(k=>!members.includes(k)).map(k=>`<option value="${esc(k)}">${esc(k)}</option>`).join('')}
          </select>
          <button class="btn btn-ghost btn-sm" style="padding:0.22rem 0.5rem" onclick="addMember(${gi},'${esc(name)}')">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="group-row-actions">
        <button class="btn btn-danger-ghost btn-sm" style="padding:0.22rem 0.5rem" onclick="deleteGroup('${esc(name)}')" title="删除组">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  const groupsHtml = `
    <div class="section-label" style="margin-bottom:0.6rem">环境组</div>
    <div class="groups-editor" style="margin-bottom:1.5rem">
      ${groupRows || '<div style="padding:0.75rem 1rem;font-family:var(--mono);font-size:0.8rem;color:var(--text-3)">暂无分组</div>'}
      <div class="add-group-row">
        <input id="new-group-name" placeholder="新组名称" autocomplete="off"
          onkeydown="if(event.key==='Enter')addGroup()" />
        <button class="btn btn-ghost btn-sm" onclick="addGroup()">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          添加组
        </button>
      </div>
    </div>`;

  // Targets
  const targetKeys = Object.keys(targets || {}).sort();
  const targetCards = targetKeys.map(key => {
    const t = targets[key];
    const isOpen = key === openTargetKey;
    const isDefault = t.is_default || t.isDefault;
    const alias = t.active_alias || t.activeAlias || '';
    const localPath = t.local_path || t.localPath || '';
    const toPath = t.to_path || t.toPath || '';
    const commands = (t.commands || []).join('\n');

    const serverOptions = servers.map(s =>
      `<option value="${esc(s.alias)}" ${s.alias === alias ? 'selected' : ''}>${esc(s.alias)} (${esc(s.host)})</option>`
    ).join('');

    return `<div class="target-card${isDefault ? ' is-default' : ''}${isOpen ? ' open' : ''}" id="tc-${esc(key)}">
      <div class="target-header" onclick="toggleTarget('${esc(key)}')">
        <span class="target-key">${esc(key)}</span>
        ${isDefault ? '<span class="default-badge">default</span>' : ''}
        <span class="target-alias-tag">${alias ? '→ ' + esc(alias) : ''}</span>
        <svg class="target-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="target-body">
        <div class="target-body-inner">
          <div class="target-body-content">
            <div class="target-form-grid">
              <div class="field">
                <label>ACTIVE_ALIAS</label>
                <select id="tv-alias-${esc(key)}" onchange="markDirty()">
                  <option value="">— 手动输入 —</option>
                  ${serverOptions}
                </select>
              </div>
              <div class="field">
                <label>IS_DEFAULT</label>
                <select id="tv-default-${esc(key)}" onchange="markDirty()">
                  <option value="false" ${!isDefault ? 'selected' : ''}>false</option>
                  <option value="true" ${isDefault ? 'selected' : ''}>true</option>
                </select>
              </div>
              <div class="field">
                <label>LOCAL_PATH</label>
                <input id="tv-local-${esc(key)}" value="${esc(localPath)}" oninput="markDirty()" placeholder="./dist" />
              </div>
              <div class="field">
                <label>TO_PATH</label>
                <input id="tv-to-${esc(key)}" value="${esc(toPath)}" oninput="markDirty()" placeholder="/var/www/app" />
              </div>
              <div class="field" style="grid-column:1/-1">
                <label>COMMANDS（每行一条）</label>
                <textarea id="tv-cmds-${esc(key)}" oninput="markDirty()" placeholder="cd /var/www/app&#10;sudo systemctl restart app">${esc(commands)}</textarea>
              </div>
            </div>
            <div class="target-footer">
              <button class="btn btn-danger-ghost btn-sm" onclick="deleteTarget('${esc(key)}')">删除此环境</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `
    ${groupsHtml}
    <div class="section-label" style="margin-bottom:0.75rem">环境列表</div>
    <div class="targets-list">${targetCards || '<div class="empty-state" style="padding:2rem 0"><p>暂无环境配置</p></div>'}</div>
    <div class="add-target-row">
      <input id="new-target-key" placeholder="新环境名称" autocomplete="off" onkeydown="if(event.key==='Enter')addTarget()" />
      <button class="btn btn-ghost btn-sm" onclick="addTarget()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        添加环境
      </button>
    </div>`;
}

function toggleTarget(key) {
  openTargetKey = openTargetKey === key ? null : key;
  // Flush edits from previously open card before re-rendering
  renderVisual();
}

function addTarget() {
  const input = document.getElementById('new-target-key');
  const key = input.value.trim();
  if (!key) { showToast('请输入环境名称', true); return; }
  if (genvData.targets[key]) { showToast(`环境 "${key}" 已存在`, true); return; }
  genvData.targets[key] = {
    active_alias: '',
    is_default: false,
    local_path: './dist',
    to_path: '/var/www/app',
    commands: ['cd /var/www/app', 'sudo systemctl restart app']
  };
  openTargetKey = key;
  input.value = '';
  syncRawFromTargets();
  renderVisual();
  markDirty();
}

function deleteTarget(key) {
  if (!confirm(`确认删除环境 "${key}"？`)) return;
  delete genvData.targets[key];
  if (openTargetKey === key) openTargetKey = null;
  syncRawFromTargets();
  renderVisual();
  markDirty();
}

// ── Dirty / save ─────────────────────────────────────
let isDirty = false;
function markDirty() {
  isDirty = true;
  document.getElementById('genv-save-btn').style.outline = '2px solid var(--accent)';
}
function clearDirty() {
  isDirty = false;
  document.getElementById('genv-save-btn').style.outline = '';
}

async function saveGenv() {
  if (!genvData) return;
  let raw;
  if (rawMode) {
    raw = document.getElementById('genv-raw-textarea').value;
    // Validate
    try { JSON.parse(raw); } catch(e) {
      showToast('JSON 格式错误，无法保存', true);
      return;
    }
  } else {
    // Collect from visual form
    collectFromVisual();
    raw = buildRaw();
  }

  try {
    const res = await fetch('/api/genv/write', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: genvData.path, raw})
    });
    if (!res.ok) { const d = await res.json(); showToast(d.error || '保存失败', true); return; }
    genvData.raw = raw;
    showToast('已保存');
    clearDirty();
    // Re-parse to keep in sync
    await selectWorkspace(genvData.path);
  } catch(e) { showToast(e.message, true); }
}

function collectFromVisual() {
  if (!genvData) return;
  const keys = Object.keys(genvData.targets);
  keys.forEach(key => {
    const k = esc(key);
    const aliasEl = document.getElementById('tv-alias-' + k);
    const defaultEl = document.getElementById('tv-default-' + k);
    const localEl = document.getElementById('tv-local-' + k);
    const toEl = document.getElementById('tv-to-' + k);
    const cmdsEl = document.getElementById('tv-cmds-' + k);
    if (!aliasEl) return;
    genvData.targets[key] = {
      active_alias: aliasEl.value,
      is_default: defaultEl.value === 'true',
      local_path: localEl.value.trim(),
      to_path: toEl.value.trim(),
      commands: cmdsEl.value.split('\n').map(s => s.trim()).filter(Boolean)
    };
  });
}

function buildRaw() {
  const out = {};
  // Always include groups key if it exists (even if empty)
  if (genvData.groups && Object.keys(genvData.groups).length) {
    out.groups = genvData.groups;
  }
  Object.entries(genvData.targets).forEach(([key, t]) => {
    out[key] = {
      active_alias: t.active_alias || t.activeAlias || '',
      is_default: !!(t.is_default || t.isDefault),
      local_path: t.local_path || t.localPath || '',
      to_path: t.to_path || t.toPath || '',
      commands: t.commands || []
    };
  });
  return JSON.stringify(out, null, 2);
}

function syncRawFromTargets() {
  // Collect visual form state before syncing (only when not in raw mode)
  if (!rawMode) collectFromVisual();
  genvData.raw = buildRaw();
  document.getElementById('genv-raw-textarea').value = genvData.raw;
}

// ── Raw mode toggle ──────────────────────────────────
function toggleRawMode() {
  if (!rawMode) {
    // Switch to raw: collect current visual state first
    collectFromVisual();
    document.getElementById('genv-raw-textarea').value = buildRaw();
  } else {
    // Switch to visual: try to parse raw
    const raw = document.getElementById('genv-raw-textarea').value;
    try {
      JSON.parse(raw);
      genvData.raw = raw;
    } catch(e) {
      showToast('JSON 格式错误，无法切换到可视化模式', true);
      return;
    }
  }
  rawMode = !rawMode;
  applyRawMode();
  if (!rawMode) renderVisual();
}

function applyRawMode() {
  const visual = document.getElementById('genv-visual');
  const raw = document.getElementById('genv-raw');
  const btn = document.getElementById('genv-toggle-raw');
  if (rawMode) {
    visual.style.display = 'none';
    raw.style.display = 'flex';
    btn.textContent = '可视化编辑';
    btn.classList.add('btn-primary');
    btn.classList.remove('btn-ghost');
  } else {
    visual.style.display = 'block';
    raw.style.display = 'none';
    btn.textContent = '原始 JSON';
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-ghost');
  }
}

// Live JSON validation in raw mode
document.getElementById('genv-raw-textarea').addEventListener('input', function() {
  const hint = document.getElementById('raw-hint');
  try {
    JSON.parse(this.value);
    hint.textContent = '✓ 格式正确';
    hint.className = 'raw-hint ok';
    markDirty();
  } catch(e) {
    hint.textContent = '✗ ' + e.message;
    hint.className = 'raw-hint err';
  }
});

// ── Groups editing ───────────────────────────────────
function addGroup() {
  const input = document.getElementById('new-group-name');
  const name = input.value.trim();
  if (!name) { showToast('请输入组名称', true); return; }
  if (!genvData.groups) genvData.groups = {};
  if (genvData.groups[name] !== undefined) { showToast(`组 "${name}" 已存在`, true); return; }
  genvData.groups[name] = [];
  input.value = '';
  syncRawFromTargets();
  renderVisual();
  markDirty();
}

function deleteGroup(name) {
  if (!confirm(`确认删除组 "${name}"？`)) return;
  if (genvData.groups) delete genvData.groups[name];
  syncRawFromTargets();
  renderVisual();
  markDirty();
}

function addMember(groupIdx, groupName) {
  const select = document.getElementById('new-member-' + groupIdx);
  const member = select ? select.value : '';
  if (!member) { showToast('请选择一个环境', true); return; }
  if (!genvData.groups) genvData.groups = {};
  if (!genvData.groups[groupName]) genvData.groups[groupName] = [];
  if (genvData.groups[groupName].includes(member)) {
    showToast(`"${member}" 已在组中`, true); return;
  }
  genvData.groups[groupName].push(member);
  syncRawFromTargets();
  renderVisual();
  markDirty();
}

function removeMember(groupIdx, groupName, memberIdx) {
  if (!genvData.groups || !genvData.groups[groupName]) return;
  genvData.groups[groupName].splice(memberIdx, 1);
  syncRawFromTargets();
  renderVisual();
  markDirty();
}

// Cache servers for alias dropdowns
window._servers = [];
(async () => {
  try {
    const res = await fetch('/api/servers');
    window._servers = await res.json() || [];
  } catch(_) {}
})();

</script>
</body>
</html>
